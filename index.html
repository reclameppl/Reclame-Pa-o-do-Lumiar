<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RECLAME PPL</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Reclame PPL">
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="theme-color" content="#004a8e">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <style>
        :root { --azul-pref: #004a8e; --verde-pref: #8dc63f; --rosa-pref: #c22085; --laranja-pref: #f58220; }
        body { background: #f4f7f6; margin: 0; font-family: 'Inter', sans-serif; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: #f0f0f0; color: #888; font-weight: 700; cursor: pointer; border-bottom: 3px solid transparent; transition: 0.3s; }
        .tab-btn.active { background: white; color: var(--azul-pref); border-bottom: 3px solid var(--laranja-pref); }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.06); margin-bottom: 15px; border-left: 8px solid #ddd; position: relative; }
        input, select, textarea { padding:14px; border-radius:12px; border:1px solid #ddd; width:100%; box-sizing:border-box; margin-bottom:10px; font-family: inherit; }
        .btn-principal { background: var(--verde-pref); color:white; border:none; padding:16px; border-radius:12px; font-weight:700; width:100%; cursor:pointer; margin-bottom: 10px; }
        .btn-voto { flex:1; padding:10px; border-radius:10px; font-weight:700; cursor:pointer; border:1px solid; font-size: 11px; background: white; }
        .slogan-pref { color: var(--azul-pref); font-size: 13px; font-weight: 600; margin-top: -15px; margin-bottom: 25px; opacity: 0.9; }
        .loc-tag { font-size: 12px; color: var(--azul-pref); font-weight: 600; display: flex; align-items: center; gap: 4px; margin-top: 5px; }
        .comment-box { background: #f9f9f9; padding: 8px; border-radius: 8px; margin-bottom: 5px; font-size: 12px; border-left: 3px solid var(--azul-pref); }
        .admin-item { background: #eee; padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .btn-delete { position: absolute; top: 15px; right: 15px; color: #ff4d4d; cursor: pointer; font-size: 20px; }

        /* ASSINATURA NEXORA AI */
        .nexora-footer {
            position: fixed !important; bottom: 10px; left: 0; width: 100%; text-align: center;
            font-size: 9px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase;
            color: #1e56cc; background: transparent; z-index: 9999; pointer-events: none; opacity: 0.7;
        }
    </style>
</head>
<body>

    <section id="authScreen" style="display: flex; width: 100%; height: 100vh; justify-content: center; align-items: center; position: fixed; top:0; left:0; z-index:999; background: #f4f7f6;">
        <div style="width: 90%; max-width: 380px; text-align: center; background: white; padding: 40px 30px; border-radius: 24px;">
            <h1 style="color: var(--azul-pref); margin-bottom: 20px;">RECLAME <span style="color: var(--laranja-pref);">PPL</span></h1>
            <p class="slogan-pref">Novos tempos, uma nova cidade</p>
            <input type="email" id="emailAuth" placeholder="E-mail">
            <input type="password" id="senhaAuth" placeholder="Senha">
            <button onclick="handleAuth()" id="btnAcaoAuth" class="btn-principal" style="background: var(--azul-pref);">ENTRAR</button>
            <button onclick="loginGoogle()" class="btn-principal" style="background:white; color:#444; border:1px solid #ddd; display:flex; align-items:center; justify-content:center; gap:10px;">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"> Google
            </button>
            <p onclick="toggleModoAuth()" id="toggleAuth" style="cursor:pointer; color: var(--verde-pref); font-weight:700; margin-top:15px; font-size:14px;">Não tem conta? Cadastre-se</p>
        </div>
    </section>

    <div id="appContainer" style="display:none;">
        <header style="background: var(--azul-pref); padding:15px; color:white; display:flex; justify-content:space-between; align-items:center;">
            <h2 style="margin:0;">RECLAME <span style="color: var(--laranja-pref);">PPL</span></h2>
            <div style="display:flex; gap:15px; align-items:center;">
                <i id="btnAdminUsers" class='bx bx-group' style="display:none; font-size:24px; cursor:pointer;" onclick="abrirModalUsuarios()"></i>
                <div onclick="sair()" style="cursor:pointer;"><i class='bx bx-log-out' style="font-size:22px;"></i></div>
            </div>
        </header>

        <div style="display:flex; background:white; position:sticky; top:0; z-index:99;">
            <button id="tabAtivos" class="tab-btn active" onclick="mudarAba('ativos')">ATIVOS</button>
            <button id="tabConcluidos" class="tab-btn" onclick="mudarAba('concluidos')">CONCLUÍDOS</button>
        </div>

        <main style="padding:20px; padding-bottom:100px;"><div id="feed"></div></main>

        <button onclick="abrirModalPost()" style="position:fixed; bottom:30px; right:20px; width:65px; height:65px; background: var(--verde-pref); color:white; border-radius:50%; border:none; font-size:35px; z-index:1000;">+</button>

        <div id="modalUsuarios" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:3000; padding:20px; overflow-y:auto;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h3>Gerenciar Usuários</h3>
                <button onclick="document.getElementById('modalUsuarios').style.display='none'" style="border:none; background:#eee; padding:10px; border-radius:8px;">Fechar</button>
            </div>
            <div id="listaUsuarios"></div>
        </div>

        <div id="modalPost" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; align-items:flex-end;">
            <div style="background:white; width:100%; border-radius:25px 25px 0 0; padding:25px;">
                <h3>Novo Relato</h3>
                <input type="text" id="postTitulo" placeholder="Título do problema">
                <input type="text" id="postLocal" placeholder="Buscando GPS...">
                <select id="postCategoria">
                    <option>Infraestrutura</option>
                    <option>Saneamento</option>
                    <option>Iluminação</option>
                    <option>Saúde</option>
                </select>
                <textarea id="postDescricao" placeholder="Descreva os detalhes..."></textarea>
                <button onclick="publicarReclamacao()" class="btn-principal">PUBLICAR</button>
                <button onclick="document.getElementById('modalPost').style.display='none'" style="width:100%; border:none; background:none; color:#999;">Cancelar</button>
            </div>
        </div>
    </div>

    <div class="nexora-footer">Desenvolvido por Nexora AI</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, updateDoc, doc, increment, arrayUnion, getDoc, getDocs, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDJf_tKyu44pn-V4Q6TSPxRw1Xl3FknL2c", authDomain: "reclame-ppl-69d59.firebaseapp.com", projectId: "reclame-ppl-69d59", storageBucket: "reclame-ppl-69d59.firebasestorage.app", messagingSenderId: "78596602073", appId: "1:78596602073:web:2b0e9bb3d5e26034f726c8" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let modoAuth = "login";
        let abaAtual = "ativos";
        let meuCargo = "cidadao";

        window.toggleModoAuth = () => {
            modoAuth = modoAuth === "login" ? "cadastro" : "login";
            document.getElementById('btnAcaoAuth').innerText = modoAuth === "login" ? "ENTRAR" : "CADASTRAR";
            document.getElementById('toggleAuth').innerText = modoAuth === "login" ? "Não tem conta? Cadastre-se" : "Já tem conta? Entrar";
        };

        window.handleAuth = async () => {
            const e = document.getElementById('emailAuth').value;
            const s = document.getElementById('senhaAuth').value;
            try {
                if(modoAuth === "login") {
                    await signInWithEmailAndPassword(auth, e, s);
                } else {
                    const res = await createUserWithEmailAndPassword(auth, e, s);
                    await setDoc(doc(db, "usuarios", res.user.uid), { email: e, role: "cidadao" });
                }
            } catch (err) { alert("Erro: " + err.message); }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docSnap = await getDoc(doc(db, "usuarios", user.uid));
                if (docSnap.exists()) meuCargo = docSnap.data().role;
                else {
                    await setDoc(doc(db, "usuarios", user.uid), { email: user.email, role: "cidadao" });
                    meuCargo = "cidadao";
                }
                document.getElementById('btnAdminUsers').style.display = meuCargo === "admin" ? 'block' : 'none';
                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('appContainer').style.display = 'block';
                carregarFeed();
            } else {
                document.getElementById('authScreen').style.display = 'flex';
                document.getElementById('appContainer').style.display = 'none';
            }
        });

        window.abrirModalPost = () => {
            document.getElementById('modalPost').style.display = 'flex';
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`);
                const d = await res.json();
                document.getElementById('postLocal').value = (d.address.road || "") + ", " + (d.address.suburb || d.address.neighbourhood || "");
            });
        };

        function carregarFeed() {
            onSnapshot(collection(db, "reclamacoes"), (snap) => {
                const feed = document.getElementById('feed');
                feed.innerHTML = "";
                let listaPosts = [];
                snap.forEach(d => listaPosts.push({ id: d.id, ...d.data() }));
                listaPosts.sort((a, b) => (b.apoios || 0) - (a.apoios || 0));

                listaPosts.forEach(p => {
                    const resolvido = p.status === "concluido";
                    if ((abaAtual === "ativos" && resolvido) || (abaAtual === "concluidos" && !resolvido)) return;
                    const cores = { pendente: "#c22085", execucao: "#f58220", concluido: "#8dc63f" };
                    const jaVotou = (p.listaVotos || []).includes(auth.currentUser.uid);
                    const comments = (p.comentarios || []).map(c => `<div class="comment-box"><b>${c.u}:</b> ${c.t}</div>`).join("");

                    let btnDeletar = (meuCargo === "admin") ? `<i class='bx bx-trash btn-delete' onclick="excluirPost('${p.id}')"></i>` : '';

                    let botoes = resolvido ? 
                        `<div style="display:flex; gap:10px; margin-top:10px;">
                            <button onclick="votar('${p.id}', 'likes')" class="btn-voto" style="color:#8dc63f; border-color:#8dc63f;" ${jaVotou ? 'disabled' : ''}>✅ Bom (${p.likes || 0})</button>
                            <button onclick="votar('${p.id}', 'dislikes')" class="btn-voto" style="color:#c22085; border-color:#c22085;" ${jaVotou ? 'disabled' : ''}>❌ Ruim (${p.dislikes || 0})</button>
                        </div>` : 
                        `<button onclick="apoiar('${p.id}')" class="btn-principal" style="background: var(--azul-pref); padding:10px; font-size:12px;" ${(p.listaApoios || []).includes(auth.currentUser.uid) ? 'disabled' : ''}>👍 APOIAR (${p.apoios || 0})</button>`;

                    let gestao = (meuCargo === "admin" || meuCargo === "oficial") ? `
                        <select onchange="alterarStatusRelato('${p.id}', this.value)" style="margin-top:10px; font-size:11px;">
                            <option value="pendente" ${p.status==='pendente'?'selected':''}>🔴 Pendente</option>
                            <option value="execucao" ${p.status==='execucao'?'selected':''}>🟡 Execução</option>
                            <option value="concluido" ${p.status==='concluido'?'selected':''}>🟢 Concluído</option>
                        </select>` : '';

                    feed.innerHTML += `<div class="card" style="border-left-color: ${cores[p.status]}">
                        ${btnDeletar}
                        <div style="display:flex; justify-content:space-between;"><small style="color:${cores[p.status]}; font-weight:800;">${p.status.toUpperCase()}</small><small style="color:#999; font-size:10px;">${p.categoria}</small></div>
                        <h3 style="color: var(--azul-pref); margin: 5px 0;">${p.titulo}</h3>
                        <p class="loc-tag"><i class='bx bx-map-pin'></i> ${p.local}</p>
                        <p style="font-size:14px; color:#555; margin:10px 0;">${p.descricao}</p>
                        <small style="color:#aaa;">Por: ${p.autorEmail || 'Usuário'}</small>
                        ${botoes} ${gestao}
                        <div style="margin-top:15px; border-top:1px solid #eee; padding-top:10px;">
                            ${comments}
                            <div style="display:flex; gap:5px; margin-top:8px;">
                                <input type="text" id="c-${p.id}" placeholder="Comentar..." style="margin:0; padding:8px; font-size:11px;">
                                <button onclick="comentar('${p.id}')" style="background:var(--verde-pref); border:none; color:white; border-radius:8px; padding:0 10px;">OK</button>
                            </div>
                        </div>
                    </div>`;
                });
            });
        }

        window.excluirPost = async (id) => {
            if(confirm("Deseja realmente excluir esta publicação?")) {
                await deleteDoc(doc(db, "reclamacoes", id));
            }
        };

        window.abrirModalUsuarios = async () => {
            document.getElementById('modalUsuarios').style.display = 'block';
            const snap = await getDocs(collection(db, "usuarios"));
            const lista = document.getElementById('listaUsuarios');
            lista.innerHTML = "";
            snap.forEach(u => {
                const data = u.data();
                const userId = u.id;
                const nomeUsuario = data.email ? data.email : "Usuário sem e-mail";
                lista.innerHTML += `<div class="admin-item">
                    <small style="font-weight: 600; color: var(--azul-pref);">${nomeUsuario}</small>
                    <select onchange="window.atualizarCargoUsuario('${userId}', this.value)" style="width:auto; margin:0; padding:5px; font-size:11px;">
                        <option value="cidadao" ${data.role==='cidadao'?'selected':''}>Cidadão</option>
                        <option value="oficial" ${data.role==='oficial'?'selected':''}>Oficial</option>
                        <option value="admin" ${data.role==='admin'?'selected':''}>Admin</option>
                    </select>
                </div>`;
            });
        };

        window.atualizarCargoUsuario = async (userId, novoCargo) => {
            await updateDoc(doc(db, "usuarios", userId), { role: novoCargo });
            alert("Cargo atualizado!");
        };

        window.alterarStatusRelato = (id, status) => updateDoc(doc(db, 'reclamacoes', id), { status: status });
        window.comentar = (id) => {
            const t = document.getElementById(`c-${id}`).value;
            if(t) updateDoc(doc(db, "reclamacoes", id), { comentarios: arrayUnion({ u: auth.currentUser.email.split('@')[0], t: t }) });
        };
        window.votar = (id, f) => updateDoc(doc(db, "reclamacoes", id), { [f]: increment(1), listaVotos: arrayUnion(auth.currentUser.uid) });
        window.apoiar = (id) => updateDoc(doc(db, "reclamacoes", id), { apoios: increment(1), listaApoios: arrayUnion(auth.currentUser.uid) });
        window.mudarAba = (a) => { abaAtual = a; document.getElementById('tabAtivos').classList.toggle('active', a==='ativos'); document.getElementById('tabConcluidos').classList.toggle('active', a==='concluidos'); carregarFeed(); };
        window.loginGoogle = () => signInWithPopup(auth, provider);
        window.sair = () => signOut(auth).then(() => location.reload());
        window.publicarReclamacao = async () => {
            await addDoc(collection(db, "reclamacoes"), { 
                titulo: document.getElementById('postTitulo').value, local: document.getElementById('postLocal').value,
                categoria: document.getElementById('postCategoria').value, descricao: document.getElementById('postDescricao').value, 
                autorEmail: auth.currentUser.email, status: "pendente", apoios: 0, likes: 0, dislikes: 0, comentarios: [], listaApoios: [], listaVotos: [], data: serverTimestamp() 
            });
            document.getElementById('modalPost').style.display = 'none';
        };
    </script>
    
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js');
      }
    </script>
</body>
</html>
